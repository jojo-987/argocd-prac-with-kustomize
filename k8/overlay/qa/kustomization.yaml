apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
  - target:
      kind: Deployment
      name: demo-backend-deployment
    patch: |-
      - op: replace
        path: /metadata/name
        value: qa-backend-deployment
      - op: replace
        path: /spec/template/spec/containers/0/env/0
        value: qa
      - op: replace
        path: /spec/template/spec/containers/0/livenessProbe/httpGet/port
        value: 5001
      - op: replace
        path: /spec/template/spec/containers/0/ports/0
        value:
          containerPort: 5001
  - target:
      kind: Service
      name: demo-backend-service
    patch: |-
      - op: replace
        path: /metadata/name
        value: qa-backend-service
      - op: replace
        path: /spec/ports/0 
        value:
          protocol: TCP
          port: 5001
          targetPort: 5001
