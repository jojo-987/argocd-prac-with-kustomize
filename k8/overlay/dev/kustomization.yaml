apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
  - target:
      kind: Deployment
      name: demo-backend-deployment
    patch: |-
      - op: replace
        path: /metadata/name
        value: dev-backend-deployment
  - target:
      kind: Service
      name: demo-backend-service
    patch: |-
      - op: replace
        path: /metadata/name
        value: dev-backend-service