apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: demo-backend
        image: krishp234/demo-backend:v1
        env:
          - name: ENV
            value: qa
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /api/data
            port: 5000
          initialDelaySeconds: 20
          periodSeconds: 60

